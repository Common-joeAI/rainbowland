name: Deploy Live Server

on:
  push:
    branches: [main]
    paths:
      - 'live-server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook (hot reload)
        run: |
          echo "Triggering hot reload deploy..."
          curl -s -X POST https://live.rainbowland.cc/api/deploy \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"${{ secrets.DEPLOY_SECRET }}\"}" \
            --max-time 30
          echo ""
          echo "Deploy webhook triggered"
