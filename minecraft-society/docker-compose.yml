services:

  # ── Vanilla Java Minecraft Server ────────────────────────────────────────────
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: osociety-minecraft
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: "VANILLA"
      VERSION: "1.21.4"
      MEMORY: "4G"
      MAX_PLAYERS: "20"
      SERVER_NAME: "Aethoria - AI Society"
      MOTD: "§6§lAethoria§r §7— A living AI society. Every villager is real."
      DIFFICULTY: "normal"
      ALLOW_NETHER: "true"
      GENERATE_STRUCTURES: "true"
      VIEW_DISTANCE: "12"
      ENABLE_COMMAND_BLOCK: "true"
      SPAWN_PROTECTION: "0"
    volumes:
      - /mnt/user/Data/minecraft/world:/data/world
      - /mnt/user/Data/minecraft/config:/data/config
      - /mnt/user/Data/minecraft/logs:/data/logs
    ports:
      - "25565:25565"
    networks:
      - osociety
    extra_hosts:
      - "host.docker.internal:172.22.0.1"

  # ── OSociety Agent Server (Python brain) ─────────────────────────────────────
  agent-server:
    build:
      context: ./agent-server
      dockerfile: Dockerfile
    container_name: osociety-agents
    restart: unless-stopped
    environment:
      LLAMA_URL: "http://172.22.0.1:8080"
      DATA_DIR:  "/data"
      PORT:      "7432"
      MAX_TOKENS: "200"
      MC_RCON_HOST: "osociety-minecraft"
      MC_RCON_PORT: "25575"
      MC_RCON_PASS: "osociety_rcon_pass"
    volumes:
      - /mnt/user/Data/minecraft/agent-data:/data
    ports:
      - "7432:7432"
    networks:
      - osociety
    depends_on:
      - minecraft
    extra_hosts:
      - "host.docker.internal:172.22.0.1"

networks:
  osociety:
    driver: bridge
