version: "3.9"

services:
  live-server:
    build: .
    container_name: rl-live
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP ingest (from Electron app FFmpeg)
      - "8080:8080"   # HLS + API  (proxied by Nginx on VPS)
      - "4000:4000"   # Chat WebSocket
    environment:
      - PORT=4000
      - STREAM_SECRET=${STREAM_SECRET:-rl-secret-change-me}
    volumes:
      - hls_data:/tmp/rl-hls

volumes:
  hls_data:
