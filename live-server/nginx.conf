# Add this to /etc/nginx/sites-available/rainbowland on the VPS
# (supplements the main rainbowland.cc config)

# WebSocket upgrade for live.rainbowland.cc
server {
    listen 443 ssl;
    server_name live.rainbowland.cc;

    ssl_certificate     /etc/letsencrypt/live/live.rainbowland.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.rainbowland.cc/privkey.pem;

    # WSS endpoint
    location /ws {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # HLS segments
    location /hls/ {
        proxy_pass http://127.0.0.1:8080/hls/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control no-cache;
    }

    # Rooms API
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        add_header Access-Control-Allow-Origin *;
    }
}
