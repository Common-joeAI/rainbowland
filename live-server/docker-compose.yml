version: "3.9"

services:
  live-server:
    build: .
    container_name: rl-live
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8080:8080"
      - "4000:4000"
    environment:
      - PORT=4000
      - STREAM_SECRET=${STREAM_SECRET:-rl-secret-change-me}
      - DEPLOY_SECRET=${DEPLOY_SECRET:-rl-deploy-secret-change-me}
      - GH_TOKEN=${GH_TOKEN}
    volumes:
      - hls_data:/tmp/rl-hls
      - video_data:/app/data/videos
      - db_data:/app/data

volumes:
  hls_data:
  video_data:
  db_data:
