name: Deploy Live Server

on:
  push:
    branches: [main]
    paths:
      - 'live-server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 5m
          script: |
            set -e
            DEPLOY_DIR=/home/cjoe/rainbowland-live
            RAW=https://raw.githubusercontent.com/Common-joeAI/rainbowland/main/live-server
            for f in server.js videos.js auth.js coins.js package.json; do
              curl -fsSL $RAW/$f -o $DEPLOY_DIR/$f
            done
            cd $DEPLOY_DIR && npm install --omit=dev --silent
            fuser -k 4000/tcp 2>/dev/null || true
            sleep 1
            nohup node server.js > /tmp/rl-server.log 2>&1 &
            sleep 4
            ss -tlnp | grep 4000 && echo "✅ Server up" || echo "❌ Server not listening"
            cat /tmp/rl-server.log | head -5
