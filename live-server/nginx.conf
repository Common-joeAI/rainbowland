load_module modules/ngx_rtmp_module.so;

worker_processes auto;
error_log stderr warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        ping 30s;

        application live {
            live on;
            record off;

            hls on;
            hls_path /tmp/rl-hls;
            hls_fragment 2s;
            hls_playlist_length 20s;
            hls_flags delete_segments;

            on_publish http://127.0.0.1:4000/rtmp/on_publish;
            on_done    http://127.0.0.1:4000/rtmp/on_done;
        }
    }
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # Allow large video uploads (500 MB)
    client_max_body_size 512M;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    server {
        listen 8080;

        # HLS live stream segments
        location /hls/ {
            alias /tmp/rl-hls/;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # Uploaded short videos — served with long cache
        location /videos/ {
            proxy_pass         http://127.0.0.1:4000/videos/;
            proxy_set_header   Host $host;
            add_header         Cache-Control "public, max-age=86400";
            add_header         Access-Control-Allow-Origin *;
        }

        # REST API
        location /api/ {
            proxy_pass         http://127.0.0.1:4000/api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            add_header         Access-Control-Allow-Origin *;
            add_header         Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header         Access-Control-Allow-Headers "Content-Type, Authorization";
        }

        # RTMP callbacks
        location /rtmp/ {
            proxy_pass         http://127.0.0.1:4000/rtmp/;
            proxy_set_header   Host $host;
        }

        # Deploy webhook
        location /api/deploy {
            proxy_pass         http://127.0.0.1:4000/api/deploy;
            proxy_set_header   Host $host;
        }

        # WebSocket (chat)
        location /ws {
            proxy_pass         http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # Static pages + everything else
        location / {
            proxy_pass         http://127.0.0.1:4000/;
            proxy_set_header   Host $host;
        }
    }
}
