name: Deploy Live Server

on:
  push:
    branches: [main]
    paths:
      - 'live-server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: 22
          script_stop: false
          timeout: 180s
          command_timeout: 10m
          script: |
            set -e
            if [ -d /home/cjoe/rainbowland ]; then
              cd /home/cjoe/rainbowland && git pull origin main
            else
              git clone https://Common-joeAI:${{ secrets.GH_TOKEN }}@github.com/Common-joeAI/rainbowland.git /home/cjoe/rainbowland
            fi
            cd /home/cjoe/rainbowland/live-server
            docker compose down --remove-orphans
            docker compose up --build -d
            docker ps | grep rl-live
            sleep 3
            docker logs rl-live --tail=25 2>&1
