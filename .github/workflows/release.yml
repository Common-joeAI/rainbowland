name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Set version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm version $TAG --no-git-tag-version || true
      - name: Build Windows
        run: npm run build:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist-electron/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm version $TAG --no-git-tag-version || true
      - name: Build Linux
        run: npm run build:linux -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          npm version $TAG --no-git-tag-version || true
      - name: Generate icns
        run: |
          mkdir -p electron/assets/icon.iconset
          sips -z 16 16     electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_16x16.png
          sips -z 32 32     electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_32x32.png
          sips -z 64 64     electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_128x128.png
          sips -z 256 256   electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_256x256.png
          sips -z 512 512   electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_512x512.png
          sips -z 1024 1024 electron/assets/icon_mac.png --out electron/assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns electron/assets/icon.iconset -o electron/assets/icon.icns
      - name: Build macOS
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  publish:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | sort
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Rainbow Land ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/**/*
          token: ${{ secrets.GH_TOKEN }}
